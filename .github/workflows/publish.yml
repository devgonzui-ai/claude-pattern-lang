name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # npm Trusted Publisher (OIDC) に必要
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # npm >= 11.5.1 (Trusted Publisher対応) を含むNodeを使用
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # e2eテストはdist/index.jsを実行するため、テスト前にビルドが必要
      - name: Build
        run: npm run build

      - name: Tests
        run: npm run test:run

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # OIDCで認証するためトークン不要（prepublishOnlyでビルドが走る）
      - name: Publish
        run: npm publish
